<!DOCTYPE html>
<html lang="en" id="html-root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Polymarket Prediction Trader</title>
<style>
:root{
  --bg:#0f1117;--surface:#161b27;--surface2:#1e2636;--border:#2a3347;
  --text:#e2e8f0;--muted:#64748b;--blue:#3b82f6;--green:#22c55e;
  --red:#ef4444;--yellow:#f59e0b;--purple:#a855f7;--cyan:#06b6d4;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px}
.layout{display:flex;height:100vh;overflow:hidden}

/* Sidebar */
.sidebar{width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.logo{padding:20px 16px 16px;border-bottom:1px solid var(--border)}
.logo h1{font-size:15px;font-weight:700;color:var(--cyan)}
.logo p{font-size:11px;color:var(--muted);margin-top:3px}
.nav{padding:12px 8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;color:var(--muted);font-size:13px;margin-bottom:2px;transition:all .15s;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:rgba(59,130,246,.15);color:var(--blue);border:1px solid rgba(59,130,246,.2)}
.nav-icon{font-size:16px;width:20px;text-align:center}
.phase-badge{font-size:9px;padding:2px 6px;border-radius:10px;margin-left:auto;font-weight:600}
.p1{background:rgba(34,197,94,.15);color:var(--green)}
.p2{background:rgba(59,130,246,.15);color:var(--blue)}
.p4{background:rgba(168,85,247,.15);color:var(--purple)}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar h2{font-size:15px;font-weight:600}
.content{flex:1;overflow-y:auto;padding:20px}

/* Cards */
.grid{display:grid;gap:12px}
.grid-4{grid-template-columns:repeat(4,1fr)}
.grid-2{grid-template-columns:repeat(2,1fr)}
.grid-3{grid-template-columns:repeat(3,1fr)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px}
.card h3{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.stat-val{font-size:24px;font-weight:700}
.stat-sub{font-size:11px;color:var(--muted);margin-top:3px}

/* Table */
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.6px;padding:8px 10px;border-bottom:1px solid var(--border);font-weight:400}
td{padding:10px;border-bottom:1px solid #1a2235;vertical-align:top}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}

/* Badge */
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;text-transform:uppercase}
.badge-yes{background:rgba(34,197,94,.15);color:var(--green)}
.badge-no{background:rgba(239,68,68,.15);color:var(--red)}
.badge-skip{background:rgba(100,116,139,.15);color:var(--muted)}
.badge-buy{background:rgba(59,130,246,.15);color:var(--blue)}

/* Form */
.form-group{margin-bottom:14px}
label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px}
input,textarea,select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:9px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color .15s}
input:focus,textarea:focus,select:focus{border-color:var(--blue)}
textarea{resize:vertical;min-height:70px}
.btn{padding:9px 18px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{background:#2563eb}
.btn-success{background:var(--green);color:#fff}.btn-success:hover{background:#16a34a}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{background:#dc2626}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:6px}
.btn-outline{background:none;border:1px solid var(--border);color:var(--muted)}.btn-outline:hover{border-color:var(--blue);color:var(--blue)}

/* Progress bar */
.progress{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:3px;transition:width .4s}

/* Market card */
.market-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:border-color .15s}
.market-card:hover{border-color:var(--blue)}
.market-q{font-size:13px;font-weight:500;margin-bottom:8px;line-height:1.4}
.market-meta{display:flex;gap:12px;font-size:11px;color:var(--muted)}
.price-bar{display:flex;height:8px;border-radius:4px;overflow:hidden;margin:8px 0}
.price-yes{background:var(--green)}
.price-no{background:var(--red)}

.pos{color:var(--green)}.neg{color:var(--red)}.neu{color:var(--muted)}
.section-title{font-size:13px;font-weight:600;color:var(--muted);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.alert{padding:12px 16px;border-radius:8px;font-size:13px;margin-bottom:12px}
.alert-success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:var(--green)}
.alert-warning{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:var(--yellow)}
.alert-info{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.3);color:var(--blue)}

.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.modal.show{display:flex}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;width:500px;max-width:95vw;max-height:85vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px}

::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#2a3347;border-radius:3px}
</style>
</head>
<body>
<div class="layout">

<!-- Sidebar -->
<aside class="sidebar">
  <div class="logo">
    <h1>📊 PM Trader</h1>
    <p>Polymarket Prediction System</p>
  </div>
  <nav class="nav">
    <button class="nav-item active" onclick="showPage('overview')">
      <span class="nav-icon">🏠</span> Overview
    </button>
    <button class="nav-item" onclick="showPage('markets')">
      <span class="nav-icon">📈</span> Markets
      <span class="phase-badge p1">Phase 1</span>
    </button>
    <button class="nav-item" onclick="showPage('journal')">
      <span class="nav-icon">📓</span> Journal
      <span class="phase-badge p1">Phase 1</span>
    </button>
    <button class="nav-item" onclick="showPage('paper')">
      <span class="nav-icon">💸</span> Paper Trading
      <span class="phase-badge p2">Phase 2</span>
    </button>
    <button class="nav-item" onclick="showPage('ai')">
      <span class="nav-icon">🤖</span> AI Analysis
      <span class="phase-badge p4">Phase 4</span>
    </button>
    <button class="nav-item" onclick="showPage('resolved')">
      <span class="nav-icon">✅</span> Resolved
      <span class="phase-badge p1">Learn</span>
    </button>
  </nav>
</aside>

<!-- Main -->
<main class="main">
  <div class="topbar">
    <h2 id="page-title">Overview</h2>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="btn btn-outline btn-sm" onclick="toggleLang()" id="lang-btn" style="min-width:42px">中文</button>
      <button class="btn btn-outline btn-sm" onclick="loadPage()">↻</button>
    </div>
  </div>
  <div class="content" id="content">Loading…</div>
</main>
</div>

<!-- Predict Modal -->
<div class="modal" id="predict-modal">
  <div class="modal-box">
    <div class="modal-title">📓 Record Prediction</div>
    <input type="hidden" id="pm-slug">
    <div class="form-group">
      <label>Market Question</label>
      <textarea id="pm-question" rows="2" readonly style="color:var(--muted)"></textarea>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group">
        <label>Market Price (YES%)</label>
        <input type="number" id="pm-market-price" step="0.01" min="0" max="1" readonly>
      </div>
      <div class="form-group">
        <label>My Probability (0–1)</label>
        <input type="number" id="pm-my-prob" step="0.01" min="0" max="1" placeholder="0.65">
      </div>
    </div>
    <div class="form-group">
      <label>Category</label>
      <input type="text" id="pm-category" placeholder="Politics / Sports / Crypto…">
    </div>
    <div class="form-group">
      <label>Reasoning</label>
      <textarea id="pm-reasoning" placeholder="Why do you think this probability is more accurate?"></textarea>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-outline" onclick="closeModal('predict-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="submitPrediction()">Save Prediction</button>
    </div>
  </div>
</div>

<!-- Paper Trade Modal -->
<div class="modal" id="trade-modal">
  <div class="modal-box">
    <div class="modal-title">💸 Paper Trade</div>
    <input type="hidden" id="tm-slug">
    <div class="form-group">
      <label>Market Question</label>
      <textarea id="tm-question" rows="2" readonly style="color:var(--muted)"></textarea>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
      <div class="form-group">
        <label>Side</label>
        <select id="tm-side">
          <option value="YES">YES</option>
          <option value="NO">NO</option>
        </select>
      </div>
      <div class="form-group">
        <label>Entry Price</label>
        <input type="number" id="tm-price" step="0.01" min="0" max="1">
      </div>
      <div class="form-group">
        <label>Amount (USDC)</label>
        <input type="number" id="tm-size" step="1" min="1" placeholder="20">
      </div>
    </div>
    <div class="form-group">
      <label>My Probability</label>
      <input type="number" id="tm-prob" step="0.01" min="0" max="1" placeholder="0.65">
    </div>
    <div class="form-group">
      <label>Reasoning</label>
      <textarea id="tm-reason" placeholder="Investment thesis…"></textarea>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-outline" onclick="closeModal('trade-modal')">Cancel</button>
      <button class="btn btn-success" onclick="submitTrade()">Place Trade</button>
    </div>
  </div>
</div>

<!-- AI Analyse Modal -->
<div class="modal" id="ai-modal">
  <div class="modal-box">
    <div class="modal-title">🤖 AI Deep Analysis</div>
    <input type="hidden" id="ai-slug">
    <div class="form-group">
      <label>Question</label>
      <textarea id="ai-question" rows="2"></textarea>
    </div>
    <div class="form-group">
      <label>Market Price (YES)</label>
      <input type="number" id="ai-price" step="0.01" min="0" max="1">
    </div>
    <div class="form-group">
      <label>Relevant News / Context (optional)</label>
      <textarea id="ai-news" rows="4" placeholder="Paste relevant news headlines or summary…"></textarea>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-outline" onclick="closeModal('ai-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="runAnalysis()">🤖 Analyze</button>
    </div>
    <div id="ai-result" style="margin-top:16px;display:none"></div>
  </div>
</div>

function toggleLang() {
  lang = lang === 'en' ? 'zh' : 'en';
  localStorage.setItem('lang', lang);
  document.getElementById('lang-btn').textContent = lang === 'en' ? '中文' : 'EN';
  document.getElementById('html-root').lang = lang === 'en' ? 'en' : 'zh';
  applyStaticLang();
  loadPage();
}

let currentPage = 'overview';

function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  event.currentTarget.classList.add('active');
  const titleKeys = {overview:'navOverview',markets:'navMarkets',journal:'navJournal',paper:'navPaper',ai:'navAI',resolved:'navResolved'};
  document.getElementById('page-title').textContent = t(titleKeys[page]) || page;
  loadPage();
}

async function loadPage() {
  const el = document.getElementById('content');
  el.innerHTML = `<div style="color:var(--muted);padding:40px;text-align:center">${t('loading')}</div>`;
  switch(currentPage) {
    case 'overview':  await renderOverview(); break;
    case 'markets':   await renderMarkets(); break;
    case 'journal':   await renderJournal(); break;
    case 'paper':     await renderPaper(); break;
    case 'ai':        await renderAI(); break;
    case 'resolved':  await renderResolved(); break;
  }
}

// ── API helpers ───────────────────────────────────────────────────────────────
async function api(path, method='GET', body=null) {
  const opts = {method, headers:{'Content-Type':'application/json'}};
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch('/api' + path, opts);
  return r.json();
}

function phaseCard(ps, pts) {
  const checks = [
    {label:t('chkPreds'), done: ps.resolved>=10},
    {label:t('chkWin'), done: ps.win_rate>=.55},
    {label:t('chkTrades'), done: pts.resolved>=20},
    {label:t('chkProfit'), done: pts.total_pnl>0},
  ];
  return checks.map(c=>
    `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:13px">
      <span style="color:${c.done?'var(--green)':'var(--muted)'}">${c.done?'✅':'⬜'}</span>

function filterMarkets() {
  const q = document.getElementById('mkt-search').value.toLowerCase();
  renderMarketCards((window._markets||[]).filter(m=>m.question.toLowerCase().includes(q)));
}
function sortMarkets() {
  const s = document.getElementById('mkt-sort').value;
  const sorted = [...(window._markets||[])].sort((a,b)=>b[s]-a[s]);
  renderMarketCards(sorted);
}

function openMarketMenu(slug, question, price) {
  if (confirm(t('menuMsg'))) {

}

}

// ── Modals ────────────────────────────────────────────────────────────────────
function openPredictModal(slug, question, price) {
  document.getElementById('pm-slug').value = slug;
  document.getElementById('pm-question').value = question;
  document.getElementById('pm-market-price').value = price;
  document.getElementById('pm-my-prob').value = '';
  document.getElementById('pm-reasoning').value = '';
  document.getElementById('pm-category').value = '';
  document.getElementById('predict-modal').classList.add('show');
}

function openTradeModal(slug, question, price) {
  document.getElementById('tm-slug').value = slug;
  document.getElementById('tm-question').value = question;
  document.getElementById('tm-price').value = price;
  document.getElementById('tm-size').value = '';
  document.getElementById('tm-prob').value = '';
  document.getElementById('tm-reason').value = '';
  document.getElementById('trade-modal').classList.add('show');
}

function closeModal(id) { document.getElementById(id).classList.remove('show'); }

async function submitPrediction() {
  const body = {
    market_slug: document.getElementById('pm-slug').value,
    question: document.getElementById('pm-question').value,
    market_price: parseFloat(document.getElementById('pm-market-price').value),
    my_probability: parseFloat(document.getElementById('pm-my-prob').value),
    reasoning: document.getElementById('pm-reasoning').value,
    category: document.getElementById('pm-category').value,
  };
  if (!body.my_probability) return alert(t('alertNeedProb'));
  await api('/predictions','POST',body);
  closeModal('predict-modal');
  alert(t('alertSaved'));
}

async function submitTrade() {
  const body = {
    market_slug: document.getElementById('tm-slug').value,
    question: document.getElementById('tm-question').value,
    side: document.getElementById('tm-side').value,
    price: parseFloat(document.getElementById('tm-price').value),
    size_usd: parseFloat(document.getElementById('tm-size').value),
    my_probability: parseFloat(document.getElementById('tm-prob').value)||0.5,
    reasoning: document.getElementById('tm-reason').value,
  };
  if (!body.size_usd) return alert(t('alertNeedSize'));
  const r = await api('/paper/trade','POST',body);
  if (r.error) return alert('Error: ' + r.error);
  closeModal('trade-modal');
  alert(t('alertPlaced') + (await api('/paper/stats')).balance?.toFixed(2));
}

async function resolvePred(id, outcome) {
  await api(`/predictions/${id}/resolve`,'POST',{outcome});
  loadPage();
}

async function resolveTrade(id, outcome) {
  const r = await api(`/paper/trades/${id}/resolve`,'POST',{outcome});
  if (r.pnl != null) alert(`${t('alertSettled')} ${r.pnl>=0?t('profit'):t('loss')} $${Math.abs(r.pnl).toFixed(2)}`);
  loadPage();
}

async function resetPaper() {
  await api('/paper/reset?balance=1000','POST');
  loadPage();
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function fmtK(v) { return v>=1e6?(v/1e6).toFixed(1)+'M':v>=1000?(v/1000).toFixed(0)+'K':v?.toFixed(0)||'0'; }
function resolveBtn(id, type) { return '—'; }

// init
document.getElementById('lang-btn').textContent = lang === 'en' ? '中文' : 'EN';
applyStaticLang();
loadPage();
</script>
</body>
</html>
